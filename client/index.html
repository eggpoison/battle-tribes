<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="utf-8" />
      <link rel="icon" href="/favicon.ico" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <meta name="theme-color" content="#000000" />
      <meta name="description" content="Web site created using create-react-app" />
      <link rel="apple-touch-icon" href="/logo192.png" />
      <link rel="manifest" href="/manifest.json" />
      <title>React App</title>
   </head>
   <body>
      <noscript>You need to enable JavaScript to run this app.</noscript>
      <script type="module" src="/src/index.ts"></script>

      <div id="main-menu">
         <div class="content">
            <input id="username-input" type="text" placeholder="Enter name here" autoFocus />

            <div>
               <label for="tribe-selection-plainspeople">
                  <input type="radio" id="tribe-selection-plainspeople" name="tribe-selection" value="0" checked />
                  Plainspeople
               </label>
               <label for="tribe-selection-barbarians">
                  <input type="radio" id="tribe-selection-barbarians" name="tribe-selection" value="1" />
                  Barbarians
               </label>
               <label for="tribe-selection-frostlings">
                  <input type="radio" id="tribe-selection-frostlings" name="tribe-selection" value="2" />
                  Frostlings
               </label>
               <label for="tribe-selection-goblins">
                  <input type="radio" id="tribe-selection-goblins" name="tribe-selection" value="3"/>
                  Goblins
               </label>
               <label for="tribe-selection-dwarves">
                  <input type="radio" id="tribe-selection-dwarves" name="tribe-selection" value="4"/>
                  Dwarves
               </label>
            </div>

            <label>
               <input type="checkbox" />
               Spectate
            </label>
            
            <button id="play-button">Play</button>
         </div>
      </div>

      <div id="canvas-wrapper" class="hidden">
         <canvas id="game-canvas"></canvas>
         <canvas id="text-canvas"></canvas>
         <!-- @SQUEAM -->
         <!-- <canvas id="tech-tree-canvas" class:hidden={!menuSelectorState.menuIsOpen(Menu.techTree)}></canvas> -->
         <canvas id="tech-tree-canvas" class="hidden"></canvas>
         <div id="frame-graph" class:hidden={!nerdVisionState.isVisible}>
            <p class="info"><span class="highlight">fps={frameGraphState.fps}</span> <span class="highlight">t_avg={frameGraphState.average.toFixed(2)}</span> <span class="highlight">t_min={frameGraphState.min.toFixed(2)}</span> <span class="highlight">t_max={frameGraphState.max.toFixed(2)}</span></p>
            <canvas id="frame-graph-canvas"></canvas>
         </div>
      </div>
   </body>
</html>
